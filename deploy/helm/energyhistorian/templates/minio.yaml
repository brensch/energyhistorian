apiVersion: v1
kind: Service
metadata:
  name: {{ include "energyhistorian.minioHost" . }}
  labels:
    {{- include "energyhistorian.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/component: minio
    {{- include "energyhistorian.selectorLabels" . | nindent 4 }}
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "energyhistorian.fullname" . }}-minio
  labels:
    app.kubernetes.io/component: minio
    {{- include "energyhistorian.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: minio
      {{- include "energyhistorian.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: minio
        {{- include "energyhistorian.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: minio
          image: {{ .Values.minio.image }}
          imagePullPolicy: IfNotPresent
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "energyhistorian.fullname" . }}-secrets
                  key: minio-root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "energyhistorian.fullname" . }}-secrets
                  key: minio-root-password
          ports:
            - containerPort: 9000
              name: api
            - containerPort: 9001
              name: console
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "energyhistorian.fullname" . }}-minio-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "energyhistorian.fullname" . }}-minio-data
  labels:
    {{- include "energyhistorian.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: {{ .Values.storageClassName | quote }}
  resources:
    requests:
      storage: {{ .Values.minio.storageSize }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "energyhistorian.fullname" . }}-minio-bootstrap
  labels:
    {{- include "energyhistorian.labels" . | nindent 4 }}
spec:
  template:
    metadata:
      labels:
        {{- include "energyhistorian.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: {{ .Values.minio.mcImage }}
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - >
              mc alias set local http://{{ include "energyhistorian.minioHost" . }}:9000
              "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" &&
              mc mb --ignore-existing local/{{ .Values.minio.bucket }};
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "energyhistorian.fullname" . }}-secrets
                  key: minio-root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "energyhistorian.fullname" . }}-secrets
                  key: minio-root-password

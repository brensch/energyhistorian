apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "energyhistorian.fullname" . }}-config
  labels:
    {{- include "energyhistorian.labels" . | nindent 4 }}
data:
  S3_ENDPOINT: {{ printf "http://%s:9000" (include "energyhistorian.minioHost" .) | quote }}
  S3_REGION: "us-east-1"
  S3_BUCKET: {{ .Values.minio.bucket | quote }}
  S3_FORCE_PATH_STYLE: "true"
  CLICKHOUSE_URL: {{ printf "http://%s:8123" (include "energyhistorian.clickhouseHost" .) | quote }}

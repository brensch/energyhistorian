apiVersion: v1
kind: Service
metadata:
  name: {{ include "energyhistorian.clickhouseHost" . }}
  labels:
    {{- include "energyhistorian.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/component: clickhouse
    {{- include "energyhistorian.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 8123
      targetPort: 8123
    - name: native
      port: 9000
      targetPort: 9000
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "energyhistorian.fullname" . }}-clickhouse
  labels:
    app.kubernetes.io/component: clickhouse
    {{- include "energyhistorian.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "energyhistorian.clickhouseHost" . }}
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: clickhouse
      {{- include "energyhistorian.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: clickhouse
        {{- include "energyhistorian.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: clickhouse
          image: {{ .Values.clickhouse.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8123
              name: http
            - containerPort: 9000
              name: native
          env:
            - name: CLICKHOUSE_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "energyhistorian.fullname" . }}-secrets
                  key: clickhouse-user
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "energyhistorian.fullname" . }}-secrets
                  key: clickhouse-password
            - name: CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT
              value: "1"
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
          readinessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 10
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.storageClassName | quote }}
        resources:
          requests:
            storage: {{ .Values.clickhouse.storageSize }}

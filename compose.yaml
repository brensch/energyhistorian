services:
  energyhistorian:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      RUST_LOG: info
      CLICKHOUSE_URL: "${CLICKHOUSE_URL:?CLICKHOUSE_URL is required}"
      CLICKHOUSE_HISTORIAN_USER: "${CLICKHOUSE_HISTORIAN_USER:?CLICKHOUSE_HISTORIAN_USER is required}"
      CLICKHOUSE_HISTORIAN_PASSWORD: "${CLICKHOUSE_HISTORIAN_PASSWORD:?CLICKHOUSE_HISTORIAN_PASSWORD is required}"
      DATA_DIR: /data
      LISTEN_ADDR: "0.0.0.0:8080"
      DISCOVER_CONCURRENCY: "4"
      DOWNLOAD_CONCURRENCY: "4"
      PARSE_CONCURRENCY: "4"
    volumes:
      - ./data:/data

  clickhouse:
    image: clickhouse/clickhouse-server:25.2
    environment:
      CLICKHOUSE_USER: "${CLICKHOUSE_ADMIN_USER:?CLICKHOUSE_ADMIN_USER is required}"
      CLICKHOUSE_PASSWORD: "${CLICKHOUSE_ADMIN_PASSWORD:?CLICKHOUSE_ADMIN_PASSWORD is required}"
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./deploy/clickhouse-config.xml:/etc/clickhouse-server/config.d/memory.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test:
        [
          "CMD",
          "clickhouse-client",
          "--user",
          "${CLICKHOUSE_ADMIN_USER:?CLICKHOUSE_ADMIN_USER is required}",
          "--password",
          "${CLICKHOUSE_ADMIN_PASSWORD:?CLICKHOUSE_ADMIN_PASSWORD is required}",
          "--query",
          "SELECT 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  postgres:
    profiles: ["ai"]
    image: postgres:16
    environment:
      POSTGRES_USER: "${POSTGRES_USER:?POSTGRES_USER is required}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      POSTGRES_DB: "${POSTGRES_DB:?POSTGRES_DB is required}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 12

  clickhouse-bootstrap:
    profiles: ["ai"]
    image: curlimages/curl:8.12.1
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      CLICKHOUSE_ADMIN_URL: "http://clickhouse:8123/"
      CLICKHOUSE_ADMIN_USER: "${CLICKHOUSE_ADMIN_USER:?CLICKHOUSE_ADMIN_USER is required}"
      CLICKHOUSE_ADMIN_PASSWORD: "${CLICKHOUSE_ADMIN_PASSWORD:?CLICKHOUSE_ADMIN_PASSWORD is required}"
      HISTORIAN_CH_USER: "${CLICKHOUSE_HISTORIAN_USER:?CLICKHOUSE_HISTORIAN_USER is required}"
      HISTORIAN_CH_PASSWORD: "${CLICKHOUSE_HISTORIAN_PASSWORD:?CLICKHOUSE_HISTORIAN_PASSWORD is required}"
      AI_API_CH_USER: "${CLICKHOUSE_AI_API_READ_USER:?CLICKHOUSE_AI_API_READ_USER is required}"
      AI_API_CH_PASSWORD: "${CLICKHOUSE_AI_API_READ_PASSWORD:?CLICKHOUSE_AI_API_READ_PASSWORD is required}"
      SEMANTIC_DB: "${CLICKHOUSE_VIEW_DB:-semantic}"
      TRACKING_DB: "${CLICKHOUSE_USAGE_DB:-tracking}"
      RAW_DATABASES: "${CLICKHOUSE_RAW_DATABASES:-raw_aemo_nemweb_data,raw_aemo_mmsdm_data,raw_aemo_mmsdm_meta,raw_aemo_docs}"
    volumes:
      - ./scripts/provision_clickhouse_users.sh:/scripts/provision_clickhouse_users.sh:ro
    entrypoint:
      - /bin/sh
      - /scripts/provision_clickhouse_users.sh

  ai-api:
    profiles: ["ai"]
    build:
      context: .
      dockerfile: apps/ai-api/Dockerfile
    depends_on:
      clickhouse:
        condition: service_healthy
      clickhouse-bootstrap:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      AI_API_PORT: "${AI_API_PORT:-8090}"
      DATABASE_URL: "postgres://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}"
      CLICKHOUSE_URL: "${CLICKHOUSE_URL:-http://clickhouse:8123}"
      CLICKHOUSE_AI_API_READ_USER: "${CLICKHOUSE_AI_API_READ_USER:?CLICKHOUSE_AI_API_READ_USER is required}"
      CLICKHOUSE_AI_API_READ_PASSWORD: "${CLICKHOUSE_AI_API_READ_PASSWORD:?CLICKHOUSE_AI_API_READ_PASSWORD is required}"
      CLICKHOUSE_HISTORIAN_USER: "${CLICKHOUSE_HISTORIAN_USER:?CLICKHOUSE_HISTORIAN_USER is required}"
      CLICKHOUSE_HISTORIAN_PASSWORD: "${CLICKHOUSE_HISTORIAN_PASSWORD:?CLICKHOUSE_HISTORIAN_PASSWORD is required}"
      CLICKHOUSE_VIEW_DB: "${CLICKHOUSE_VIEW_DB:-semantic}"
      CLICKHOUSE_USAGE_DB: "${CLICKHOUSE_USAGE_DB:-tracking}"
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:3000}"
      ALLOW_DEV_AUTH: "${ALLOW_DEV_AUTH:-false}"
      WORKOS_ISSUER: "${WORKOS_ISSUER:-http://workos.invalid}"
      WORKOS_AUDIENCE: "${WORKOS_AUDIENCE:-dev-client}"
      LLM_PROVIDER: "${LLM_PROVIDER:-anthropic}"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-5}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID:-}
      STRIPE_SUCCESS_URL: ${STRIPE_SUCCESS_URL:-http://localhost:3000}
      STRIPE_CANCEL_URL: ${STRIPE_CANCEL_URL:-http://localhost:3000}
      STRIPE_PORTAL_RETURN_URL: ${STRIPE_PORTAL_RETURN_URL:-http://localhost:3000}
    ports:
      - "8090:8090"

  web:
    profiles: ["ai"]
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      ai-api:
        condition: service_started
    environment:
      API_BASE_URL: "${API_BASE_URL:-http://localhost:8090}"
      WORKOS_CLIENT_ID: ${WORKOS_CLIENT_ID:-}
      WORKOS_API_HOSTNAME: ${WORKOS_API_HOSTNAME:-}
      ENABLE_DEV_AUTH: "${ALLOW_DEV_AUTH:-false}"
      DEV_USER_ID: dev-user
      DEV_USER_EMAIL: dev@example.com
      DEV_USER_NAME: Developer
      DEV_ORG_ID: dev-org
    ports:
      - "3000:8080"

volumes:
  clickhouse-data:
  postgres-data:

services:
  clickhouse:
    image: clickhouse/clickhouse-server:25.2
    environment:
      CLICKHOUSE_USER: energyhistorian
      CLICKHOUSE_PASSWORD: energyhistorian
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./deploy/clickhouse-config.xml:/etc/clickhouse-server/config.d/memory.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test:
        [
          "CMD",
          "clickhouse-client",
          "--user",
          "energyhistorian",
          "--password",
          "energyhistorian",
          "--query",
          "SELECT 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  clickhouse-data:

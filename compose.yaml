services:
  schedulerd:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/usr/local/bin/schedulerd", "--listen-addr", "0.0.0.0:8080"]
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      RUST_LOG: info
      POSTGRES_URL: postgres://energyhistorian:energyhistorian@postgres:5432/energyhistorian
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: historian-raw
      S3_ACCESS_KEY_ID: minio
      S3_SECRET_ACCESS_KEY: minio123
      S3_FORCE_PATH_STYLE: "true"
    ports:
      - "18080:8080"

  downloaderd:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/usr/local/bin/downloaderd", "--listen-addr", "0.0.0.0:8080"]
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      RUST_LOG: info
      POSTGRES_URL: postgres://energyhistorian:energyhistorian@postgres:5432/energyhistorian
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: historian-raw
      S3_ACCESS_KEY_ID: minio
      S3_SECRET_ACCESS_KEY: minio123
      S3_FORCE_PATH_STYLE: "true"

  parserd:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/usr/local/bin/parserd", "--listen-addr", "0.0.0.0:8080"]
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      RUST_LOG: info
      POSTGRES_URL: postgres://energyhistorian:energyhistorian@postgres:5432/energyhistorian
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: historian-raw
      S3_ACCESS_KEY_ID: minio
      S3_SECRET_ACCESS_KEY: minio123
      S3_FORCE_PATH_STYLE: "true"

  postgres:
    image: postgres:16-bookworm
    environment:
      POSTGRES_DB: energyhistorian
      POSTGRES_USER: energyhistorian
      POSTGRES_PASSWORD: energyhistorian
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U energyhistorian -d energyhistorian"]
      interval: 10s
      timeout: 5s
      retries: 12

  minio:
    image: minio/minio:RELEASE.2026-02-20T00-00-00Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9001:9001"
      - "9002:9000"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 12

  minio-init:
    image: minio/mc:RELEASE.2026-02-20T00-00-00Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - >
        mc alias set local http://minio:9000 minio minio123 &&
        mc mb --ignore-existing local/historian-raw &&
        tail -f /dev/null

  clickhouse:
    image: clickhouse/clickhouse-server:25.2
    environment:
      CLICKHOUSE_USER: energyhistorian
      CLICKHOUSE_PASSWORD: energyhistorian
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test:
        [
          "CMD",
          "clickhouse-client",
          "--user",
          "energyhistorian",
          "--password",
          "energyhistorian",
          "--query",
          "SELECT 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  clickhouse-data:
  minio-data:
  postgres-data:
